<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let Me Introduce You</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Floating Glow */
body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#00f7ff;
border-radius:50%;
filter:blur(120px);
top:-80px;
left:-80px;
animation:move1 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:#ff00c8;
border-radius:50%;
filter:blur(120px);
bottom:-80px;
right:-80px;
animation:move2 8s infinite alternate;
}

@keyframes move1{
to{
transform:translate(120px,80px);
}
}

@keyframes move2{
to{
transform:translate(-120px,-80px);
}
}

.card{

position:relative;
width:400px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(0,0,0,.4);
text-align:center;
color:white;
z-index:10;

}

.card h1{

font-size:32px;
margin-bottom:10px;

}

.card p{

color:#ddd;
margin-bottom:30px;

}

input{

width:100%;
padding:15px;
margin:12px 0;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
font-size:16px;
transition:.3s;

}

input::placeholder{

color:#ddd;

}

input:focus{

box-shadow:0 0 15px #00f7ff;
transform:scale(1.03);

}

button{

width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:linear-gradient(90deg,#00f7ff,#0066ff);
color:white;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 0 20px #00f7ff;

}

</style>
</head>

<body>

<div class="card">

<h1>✨ Let Me Introduce You ✨</h1>

<p>Enter your details below</p>

<form action="https://formspree.io/f/xjgneroa" method="POST">

<input type="text"
name="name"
placeholder="Enter Your Name"
required>

<input type="text"
name="secret_word"
placeholder="Enter Any Secret Word"
required>

<button type="submit">🚀 Login</button>

</form>

</div>

</body>
</html>
